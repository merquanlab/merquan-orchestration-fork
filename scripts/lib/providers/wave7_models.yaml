# Wave 7 model registry — LiteLLM-compatible model names + cost/MTok
providers:
  deepseek:
    enabled: true
    api_key_env: DEEPSEEK_API_KEY
    models:
      deepseek-v4-pro:
        litellm_name: "deepseek/deepseek-v3.2"
        cost_input_per_mtok: 0.28
        cost_output_per_mtok: 0.40
        max_tokens: 8192
        supports_streaming: true
        supports_tool_calls: true
        task_classes: ["coding", "review", "analysis"]
  moonshot:
    enabled: true
    api_key_env: MOONSHOT_API_KEY
    models:
      kimi-k2-0905-default:
        litellm_name: "moonshot/kimi-k2-0905-preview"
        cost_input_per_mtok: 0.60
        cost_output_per_mtok: 2.50
        max_tokens: 8192
        supports_streaming: true
        supports_tool_calls: true
        task_classes: ["coding", "review", "analysis"]
      kimi-k2-6:
        litellm_name: "moonshot/kimi-k2.6"
        cost_input_per_mtok: 0.95
        cost_output_per_mtok: 4.00
        max_tokens: 8192
        supports_streaming: true
        supports_tool_calls: true
        task_classes: ["coding-premium"]
  zai:
    enabled: true
    api_key_env: OPENROUTER_API_KEY  # via OpenRouter, not direct Zhipu
    direct_provider_note: "Native Zhipu integration deferred; PR-7.3 uses OpenRouter fallback"
    models:
      glm-5.1-default:
        litellm_name: "openrouter/z-ai/glm-5"
        cost_input_per_mtok: 0.50  # OpenRouter pass-through cost
        cost_output_per_mtok: 2.50
        max_tokens: 8192
        supports_streaming: true
        supports_tool_calls: true
        task_classes: ["coding", "review"]
        deprecated_models:  # explicit guard against legacy
          - "glm-4.5"
          - "glm-4.6"
