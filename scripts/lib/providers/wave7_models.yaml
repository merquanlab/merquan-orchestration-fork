# Wave 7 model registry — LiteLLM-compatible model names + cost/MTok
# Anthropic, OpenAI, Google entries added for cost tracking (P0-B).
providers:
  anthropic:
    enabled: true
    api_key_env: ANTHROPIC_API_KEY
    models:
      opus:
        litellm_name: "anthropic/claude-opus-4-7"
        cost_input_per_mtok: 15.00
        cost_output_per_mtok: 75.00
        max_tokens: 32000
        context_window: 200000
        supports_streaming: true
        supports_tool_calls: true
        task_classes: ["coding-premium", "review", "analysis"]
      sonnet:
        litellm_name: "anthropic/claude-sonnet-4-6"
        cost_input_per_mtok: 3.00
        cost_output_per_mtok: 15.00
        max_tokens: 64000
        context_window: 200000
        supports_streaming: true
        supports_tool_calls: true
        task_classes: ["coding", "review", "analysis"]
      haiku:
        litellm_name: "anthropic/claude-haiku-4-5-20251001"
        cost_input_per_mtok: 1.00
        cost_output_per_mtok: 5.00
        max_tokens: 8096
        context_window: 200000
        supports_streaming: true
        supports_tool_calls: true
        task_classes: ["coding", "fast"]
  openai:
    enabled: true
    api_key_env: OPENAI_API_KEY
    models:
      gpt-5.2-codex:
        litellm_name: "openai/gpt-5.2-codex"
        cost_input_per_mtok: 1.25
        cost_output_per_mtok: 10.00
        max_tokens: 32000
        context_window: 128000
        supports_streaming: true
        supports_tool_calls: true
        task_classes: ["coding", "review"]
  google:
    enabled: true
    api_key_env: GEMINI_API_KEY
    models:
      gemini-2.5-pro:
        litellm_name: "google/gemini-2.5-pro"
        cost_input_per_mtok: 1.25
        cost_output_per_mtok: 5.00
        max_tokens: 65536
        context_window: 1048576
        supports_streaming: true
        supports_tool_calls: true
        task_classes: ["coding", "review", "analysis"]
  deepseek:
    enabled: true
    api_key_env: DEEPSEEK_API_KEY
    models:
      deepseek-v4-pro:
        litellm_name: "deepseek/deepseek-v4-pro"
        cost_input_per_mtok: 0.435   # currently 75% discount; full $1.74 input
        cost_output_per_mtok: 0.87   # full $3.48 output
        max_tokens: 384000           # 384K output ceiling
        context_window: 1000000      # 1M context
        supports_streaming: true
        supports_tool_calls: true
        task_classes: ["coding-premium", "review", "analysis"]
      deepseek-v4-flash:
        litellm_name: "deepseek/deepseek-v4-flash"
        cost_input_per_mtok: 0.14    # legacy "chat" model evolved
        cost_output_per_mtok: 0.28
        max_tokens: 384000
        context_window: 1000000
        supports_streaming: true
        supports_tool_calls: true
        task_classes: ["coding", "review", "analysis"]
  moonshot:
    enabled: true
    api_key_env: MOONSHOT_API_KEY
    models:
      kimi-k2-0905-default:
        litellm_name: "moonshot/kimi-k2-0905-preview"
        cost_input_per_mtok: 0.60
        cost_output_per_mtok: 2.50
        max_tokens: 8192
        supports_streaming: true
        supports_tool_calls: true
        task_classes: ["coding", "review", "analysis"]
      kimi-k2-6:
        litellm_name: "moonshot/kimi-k2.6"
        cost_input_per_mtok: 0.95
        cost_output_per_mtok: 4.00
        max_tokens: 8192
        supports_streaming: true
        supports_tool_calls: true
        task_classes: ["coding-premium"]
  zai:
    enabled: true
    api_key_env: OPENROUTER_API_KEY  # via OpenRouter, not direct Zhipu
    direct_provider_note: "Native Zhipu integration deferred; PR-7.3 uses OpenRouter fallback"
    models:
      glm-5.1-default:
        litellm_name: "openrouter/z-ai/glm-5"
        cost_input_per_mtok: 0.50  # OpenRouter pass-through cost
        cost_output_per_mtok: 2.50
        max_tokens: 8192
        supports_streaming: true
        supports_tool_calls: true
        task_classes: ["coding", "review"]
        deprecated_models:  # explicit guard against legacy
          - "glm-4.5"
          - "glm-4.6"
  kimi_cli:
    enabled: true
    api_key_env: ""  # no API key; OAuth via `kimi login`
    models:
      kimi-default:
        litellm_name: ""  # kimi CLI direct; not via LiteLLM
        cost_input_per_mtok: 0.60   # estimate based on moonshot K2 pricing
        cost_output_per_mtok: 2.50
        max_tokens: 8192
        supports_streaming: true
        supports_tool_calls: true
        task_classes: ["coding", "review", "analysis"]
      kimi-k2-6:
        litellm_name: ""  # kimi CLI direct; not via LiteLLM
        cost_input_per_mtok: 0.95
        cost_output_per_mtok: 4.00
        max_tokens: 8192
        supports_streaming: true
        supports_tool_calls: true
        task_classes: ["coding-premium"]
